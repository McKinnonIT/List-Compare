<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff List Comparator — McKinnon SC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Lora:wght@500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --mck-blue:       #0F216D;
  --mck-blue-hover: #2D3FBF;
  --mck-blue-tint:  #E8ECFB;
  --green:          #16a34a;
  --green-light:    #dcfce7;
  --amber:          #d97706;
  --amber-light:    #fef3c7;
  --red:            #dc2626;
  --red-light:      #fee2e2;
  --purple:         #7c3aed;
  --purple-light:   #ede9fe;
  --text:           #111827;
  --text-mid:       #374151;
  --text-muted:     #6B7280;
  --border:         rgba(0,0,0,0.10);
  --border-card:    rgba(0,0,0,0.07);
  --surface:        #ffffff;
  --bg:             #F7F8FC;
  --font-body:      'Inter', system-ui, sans-serif;
  --font-display:   'Lora', Georgia, serif;
  --font-mono:      'JetBrains Mono', monospace;
  --radius:         8px;
  --radius-lg:      10px;
}

body {
  font-family: var(--font-body);
  font-weight: 400;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.site-header {
  background: var(--mck-blue);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  height: 52px;
  gap: 12px;
}
.header-wordmark { font-family: var(--font-display); font-weight: 600; font-size: 16px; color: #fff; letter-spacing: 0.01em; white-space: nowrap; }
.header-divider  { width: 1px; height: 16px; background: rgba(255,255,255,0.25); }
.header-tool     { font-size: 13px; color: rgba(255,255,255,0.7); }
.header-spacer   { flex: 1; }
.header-badge    { font-size: 11px; font-weight: 500; background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8); border: 0.5px solid rgba(255,255,255,0.2); padding: 3px 10px; border-radius: 99px; }

/* ── Layout ── */
.main { max-width: 1120px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

/* ── Page title + workflow steps ── */
.page-header { margin-bottom: 1.75rem; }
.page-title  { font-family: var(--font-display); font-weight: 600; font-size: 22px; color: var(--mck-blue); margin-bottom: 6px; }
.workflow-steps { display: flex; align-items: center; gap: 0; margin-top: 10px; }
.wf-step {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; color: var(--text-muted);
}
.wf-num {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--mck-blue-tint); color: var(--mck-blue);
  font-size: 11px; font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.wf-step.active .wf-num { background: var(--mck-blue); color: #fff; }
.wf-step.active .wf-label { color: var(--text-mid); font-weight: 500; }
.wf-label { white-space: nowrap; }
.wf-arrow { margin: 0 10px; color: var(--border); font-size: 14px; user-select: none; }

/* ── Card ── */
.card { background: var(--surface); border: 0.5px solid var(--border-card); border-radius: var(--radius-lg); }

/* ── Input columns ── */
.columns { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0; margin-bottom: 16px; align-items: stretch; }

.col-card { background: var(--surface); border: 0.5px solid var(--border-card); border-radius: var(--radius-lg); display: flex; flex-direction: column; }

.col-head {
  padding: 10px 14px;
  background: var(--mck-blue-tint);
  border-bottom: 0.5px solid var(--border-card);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  display: flex; align-items: center; gap: 8px;
}
.col-title { font-family: var(--font-display); font-weight: 500; font-size: 14px; color: var(--mck-blue); flex: 1; }
.col-count { font-size: 11px; font-weight: 500; background: rgba(15,33,109,0.1); color: var(--mck-blue); border-radius: 99px; padding: 2px 9px; white-space: nowrap; }

/* Column tag pills — state indicators */
.col-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.col-tag  { font-size: 10px; font-weight: 500; padding: 1px 7px; border-radius: 99px; background: rgba(15,33,109,0.08); color: var(--mck-blue); white-space: nowrap; }

/* Per-column labelled action buttons row */
.col-actions-row {
  padding: 6px 10px;
  border-bottom: 0.5px solid var(--border-card);
  background: var(--bg);
  display: flex; gap: 5px; flex-wrap: wrap; align-items: center;
}
.col-action-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text-mid);
  font-family: var(--font-body);
  font-size: 12px; font-weight: 400;
  cursor: pointer;
  transition: all 0.1s;
  white-space: nowrap;
}
.col-action-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
.col-action-btn:hover { background: var(--mck-blue-tint); border-color: var(--mck-blue); color: var(--mck-blue); }
.col-action-btn.done  { background: var(--green-light); border-color: var(--green); color: var(--green); }
.col-action-btn.clear-btn { color: var(--text-muted); margin-left: auto; }
.col-action-btn.clear-btn:hover { background: var(--red-light); border-color: var(--red); color: var(--red); }

textarea {
  width: 100%; flex: 1;
  min-height: 200px;
  resize: vertical;
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 12px 14px;
  border: none;
  background: var(--surface);
  color: var(--text);
  line-height: 1.75;
  display: block;
}
textarea:focus { outline: none; box-shadow: inset 0 0 0 1.5px var(--mck-blue-tint); }
textarea::placeholder { color: var(--text-muted); opacity: 0.55; }

.col-footer {
  padding: 7px 14px;
  border-top: 0.5px solid var(--border-card);
  background: var(--bg);
  display: flex; align-items: center; gap: 8px;
}
.stats { font-size: 11px; color: var(--text-muted); flex: 1; }
.stats b { color: var(--text-mid); font-weight: 500; }

/* ── Centre connector column ── */
.col-connector {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 16px;
  gap: 10px;
}
.connector-line {
  width: 1px;
  flex: 1;
  max-height: 60px;
  background: var(--border-card);
}
.connector-swap {
  width: 32px; height: 32px;
  border: 0.5px solid var(--border);
  border-radius: 50%;
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
  position: relative;
}
.connector-swap:hover { background: var(--mck-blue-tint); border-color: var(--mck-blue); color: var(--mck-blue); }

/* ── Compare bar ── */
.compare-bar {
  background: var(--surface);
  border: 0.5px solid var(--border-card);
  border-radius: var(--radius-lg);
  margin-bottom: 16px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.compare-bar-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-right: 4px;
  white-space: nowrap;
}
.compare-bar-spacer { flex: 1; }
.compare-bar-right  { display: flex; align-items: center; gap: 8px; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 13px; font-weight: 400;
  cursor: pointer;
  transition: background 0.1s, border-color 0.1s, color 0.1s;
  white-space: nowrap;
  border: 0.5px solid var(--border);
  background: var(--surface);
  color: var(--text-mid);
  line-height: 1.4;
}
.btn:hover  { background: var(--mck-blue-tint); border-color: var(--mck-blue); color: var(--mck-blue); }
.btn:active { opacity: 0.82; }
.btn svg    { width: 14px; height: 14px; flex-shrink: 0; }

.btn-primary { background: var(--mck-blue); color: #fff; border-color: var(--mck-blue); font-weight: 500; font-size: 14px; padding: 8px 20px; }
.btn-primary:hover { background: var(--mck-blue-hover); border-color: var(--mck-blue-hover); color: #fff; }
.btn-primary.done  { background: var(--green); border-color: var(--green); }

.btn-ghost  { background: transparent; }
.btn-sm     { padding: 4px 10px; font-size: 11px; }

.btn-danger { color: var(--red); border-color: rgba(220,38,38,0.2); background: transparent; }
.btn-danger:hover { background: var(--red-light); border-color: var(--red); color: var(--red); }

/* Confirmation state for clear all */
.btn-danger.confirming { background: var(--red); color: #fff; border-color: var(--red); }
.btn-danger.confirming:hover { background: #b91c1c; }

/* ── Divider ── */
.btn-divider { width: 0.5px; height: 22px; background: var(--border); flex-shrink: 0; }

/* ── Results ── */
.results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.result-block { background: var(--surface); border: 0.5px solid var(--border-card); border-radius: var(--radius-lg); overflow: hidden; }
.result-block.t-amber  { border-top: 2px solid var(--amber); }
.result-block.t-blue   { border-top: 2px solid var(--mck-blue); }
.result-block.t-green  { border-top: 2px solid var(--green); }
.result-block.t-purple { border-top: 2px solid var(--purple); }
.result-block.t-red    { border-top: 2px solid var(--red); }

.result-head {
  padding: 9px 14px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 0.5px solid var(--border-card);
  background: var(--bg);
}
.rh-title { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }

.pill { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 99px; white-space: nowrap; }
.pill-amber  { background: var(--amber-light);  color: #92400e; }
.pill-blue   { background: var(--mck-blue-tint); color: var(--mck-blue); }
.pill-green  { background: var(--green-light);  color: #14532d; }
.pill-purple { background: var(--purple-light); color: #4c1d95; }
.pill-red    { background: var(--red-light);    color: #7f1d1d; }

.result-copy-btn {
  font-size: 11px; padding: 3px 9px;
  border: 0.5px solid var(--border); border-radius: var(--radius);
  background: var(--surface); color: var(--text-muted);
  cursor: pointer; transition: all 0.1s; white-space: nowrap;
}
.result-copy-btn:hover { background: var(--mck-blue-tint); color: var(--mck-blue); border-color: var(--mck-blue); }
.result-copy-btn.done  { background: var(--green-light); color: var(--green); border-color: var(--green); }

.result-body { max-height: 260px; overflow-y: auto; }
.result-body .entry {
  padding: 5px 14px;
  font-family: var(--font-mono); font-size: 12px;
  color: var(--text);
  border-bottom: 0.5px solid rgba(0,0,0,0.04);
  display: flex; align-items: center; gap: 10px;
}
.result-body .entry:last-child { border-bottom: none; }
.e-index { font-size: 10px; color: var(--text-muted); min-width: 20px; font-family: var(--font-body); }
.e-val   { flex: 1; }
.result-empty { padding: 1.5rem; text-align: center; color: var(--text-muted); font-size: 13px; }

/* ── Summary bar ── */
.summary-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 12px; }
.summary-card { background: var(--surface); border: 0.5px solid var(--border-card); border-radius: var(--radius); padding: 10px 14px; text-align: center; }
.sc-num   { font-family: var(--font-display); font-size: 22px; font-weight: 500; color: var(--mck-blue); }
.sc-label { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 3.5rem 1rem; color: var(--text-muted); }
.empty-state svg { margin: 0 auto 14px; opacity: 0.2; display: block; }
.empty-state p   { font-size: 14px; }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--text); color: #fff;
  padding: 9px 16px; border-radius: var(--radius);
  font-size: 13px; opacity: 0; transform: translateY(6px);
  transition: all 0.2s; pointer-events: none; z-index: 9999;
}
#toast.show { opacity: 1; transform: translateY(0); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

@media (max-width: 720px) {
  .columns { grid-template-columns: 1fr; }
  .col-connector { flex-direction: row; padding: 8px 0; }
  .connector-line { width: 40px; height: 1px; max-height: unset; }
  .results-grid, .summary-bar { grid-template-columns: 1fr; }
  .compare-bar { flex-direction: column; align-items: stretch; }
  .compare-bar-spacer, .compare-bar-right { display: contents; }
  .workflow-steps { flex-wrap: wrap; gap: 6px; }
  .wf-arrow { display: none; }
  .main { padding: 1rem 1rem 3rem; }
}
</style>
</head>
<body>

<header class="site-header">
  <span class="header-wordmark">McKinnon Secondary College</span>
  <span class="header-divider"></span>
  <span class="header-tool">IT Tools</span>
  <span class="header-spacer"></span>
  <span class="header-badge">Staff List Comparator</span>
</header>

<main class="main">

  <!-- Page header + workflow guide -->
  <div class="page-header">
    <h1 class="page-title">Staff list comparator</h1>
    <div class="workflow-steps">
      <div class="wf-step active" id="wf1">
        <span class="wf-num">1</span>
        <span class="wf-label">Paste your lists</span>
      </div>
      <span class="wf-arrow">→</span>
      <div class="wf-step" id="wf2">
        <span class="wf-num">2</span>
        <span class="wf-label">Clean if needed</span>
      </div>
      <span class="wf-arrow">→</span>
      <div class="wf-step" id="wf3">
        <span class="wf-num">3</span>
        <span class="wf-label">Compare</span>
      </div>
      <span class="wf-arrow">→</span>
      <div class="wf-step" id="wf4">
        <span class="wf-num">4</span>
        <span class="wf-label">Export results</span>
      </div>
    </div>
  </div>

  <!-- Input columns with centre connector -->
  <div class="columns">

    <!-- List A -->
    <div class="col-card">
      <div class="col-head">
        <span class="col-title">List A</span>
        <span class="col-count" id="count-a">0 entries</span>
        <div class="col-tags" id="tags-a"></div>
      </div>
      <div class="col-actions-row">
        <button class="col-action-btn" id="strip-btn-a" onclick="stripList('a')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Strip domains
        </button>
        <button class="col-action-btn" id="sort-btn-a" onclick="sortList('a')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Sort A–Z
        </button>
        <button class="col-action-btn" id="dedup-btn-a" onclick="dedupList('a')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          Remove duplicates
        </button>
        <button class="col-action-btn" id="paste-btn-a" onclick="pasteFromClipboard('a')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
          Paste
        </button>
        <button class="col-action-btn clear-btn" onclick="clearList('a')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Clear
        </button>
      </div>
      <textarea id="list-a" placeholder="Paste list A here — one entry per line&#10;&#10;e.g.&#10;jsmith&#10;jane.doe@mckinnonsc.vic.edu.au&#10;t.nguyen@mckinnonsc.vic.edu.au"></textarea>
      <div class="col-footer">
        <span class="stats" id="stats-a">—</span>
      </div>
    </div>

    <!-- Centre connector -->
    <div class="col-connector">
      <div class="connector-line"></div>
      <button class="connector-swap" onclick="swapLists()" title="Swap lists A and B">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
      <div class="connector-line"></div>
    </div>

    <!-- List B -->
    <div class="col-card">
      <div class="col-head">
        <span class="col-title">List B</span>
        <span class="col-count" id="count-b">0 entries</span>
        <div class="col-tags" id="tags-b"></div>
      </div>
      <div class="col-actions-row">
        <button class="col-action-btn" id="strip-btn-b" onclick="stripList('b')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Strip domains
        </button>
        <button class="col-action-btn" id="sort-btn-b" onclick="sortList('b')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Sort A–Z
        </button>
        <button class="col-action-btn" id="dedup-btn-b" onclick="dedupList('b')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          Remove duplicates
        </button>
        <button class="col-action-btn" id="paste-btn-b" onclick="pasteFromClipboard('b')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
          Paste
        </button>
        <button class="col-action-btn clear-btn" onclick="clearList('b')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Clear
        </button>
      </div>
      <textarea id="list-b" placeholder="Paste list B here — one entry per line&#10;&#10;e.g.&#10;jsmith&#10;m.chen@mckinnonsc.vic.edu.au&#10;sarah.k&#10;r.patel"></textarea>
      <div class="col-footer">
        <span class="stats" id="stats-b">—</span>
      </div>
    </div>
  </div>

  <!-- Compare bar — primary action zone -->
  <div class="compare-bar">
    <span class="compare-bar-label">Compare</span>

    <button class="btn btn-primary" id="compare-btn" onclick="compare()">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Compare lists
    </button>

    <button class="btn" id="compare-ci-btn" onclick="compareIgnoreCase()" title="Treats JSmith and jsmith as the same entry">
      Compare (ignore case)
    </button>

    <div class="btn-divider"></div>

    <button class="btn" onclick="mergeLists()" title="Combines both lists into List A, deduplicating">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Merge into A
    </button>

    <button class="btn" onclick="exportCSV()">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export CSV
    </button>

    <div class="compare-bar-spacer"></div>

    <!-- Destructive action — separated to the right -->
    <button class="btn btn-danger" id="clear-all-btn" onclick="clearAllWithConfirm()">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
      <span id="clear-label">Clear all</span>
    </button>
  </div>

  <!-- Results -->
  <div id="results-area">
    <div class="empty-state">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <p>Paste your lists above, then click <strong>Compare lists</strong></p>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
/* ── Helpers ── */
function parseList(raw) {
  return raw.split('\n').map(s => s.trim()).filter(Boolean);
}
function processEntry(entry, strip, ci) {
  let v = entry.trim();
  if (strip) v = v.replace(/@mckinnonsc\.vic\.edu\.au$/i, '').trim();
  if (ci) v = v.toLowerCase();
  return v;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── State tags on column headers ── */
const colState = { a: { stripped: false, sorted: false }, b: { stripped: false, sorted: false } };

function updateTags(side) {
  const tags = document.getElementById('tags-' + side);
  tags.innerHTML = '';
  if (colState[side].stripped) {
    const t = document.createElement('span');
    t.className = 'col-tag'; t.textContent = 'domains stripped';
    tags.appendChild(t);
  }
  if (colState[side].sorted) {
    const t = document.createElement('span');
    t.className = 'col-tag'; t.textContent = 'sorted A–Z';
    tags.appendChild(t);
  }
}

/* ── Stats ── */
function updateStats(side) {
  const raw = parseList(document.getElementById('list-' + side).value);
  const proc = raw.map(e => processEntry(e, false, true));
  const unique = new Set(proc).size;
  const dupes = raw.length - unique;
  const emails = raw.filter(e => e.includes('@')).length;

  document.getElementById('count-' + side).textContent =
    raw.length + ' entr' + (raw.length === 1 ? 'y' : 'ies');
  document.getElementById('stats-' + side).innerHTML =
    (raw.length === 0 ? '—' : '') +
    (raw.length > 0 ? `<b>${unique}</b> unique` : '') +
    (dupes > 0 ? ` · <b style="color:var(--red)">${dupes}</b> dupe${dupes>1?'s':''}` : '') +
    (emails > 0 ? ` · <b>${emails}</b> with @domain` : '');

  updateWorkflowStep();
}

document.getElementById('list-a').addEventListener('input', () => { colState.a.sorted = false; colState.a.stripped = false; updateTags('a'); updateStats('a'); });
document.getElementById('list-b').addEventListener('input', () => { colState.b.sorted = false; colState.b.stripped = false; updateTags('b'); updateStats('b'); });

/* ── Workflow step indicator ── */
function updateWorkflowStep() {
  const hasA = parseList(document.getElementById('list-a').value).length > 0;
  const hasB = parseList(document.getElementById('list-b').value).length > 0;
  const hasResults = document.getElementById('results-area').querySelector('.summary-bar');

  [1,2,3,4].forEach(n => document.getElementById('wf'+n).classList.remove('active'));
  if (hasResults)     document.getElementById('wf4').classList.add('active');
  else if (hasA || hasB) document.getElementById('wf2').classList.add('active');
  else                document.getElementById('wf1').classList.add('active');
}

/* ── Button done-state flash ── */
function flashDone(btnId, ms = 1400) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.classList.add('done');
  setTimeout(() => btn.classList.remove('done'), ms);
}

/* ── Toast ── */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function copyText(arr, btnEl) {
  navigator.clipboard.writeText(arr.join('\n')).then(() => {
    toast('Copied ' + arr.length + ' entries');
    if (btnEl) { btnEl.classList.add('done'); btnEl.textContent = 'Copied ✓'; setTimeout(() => { btnEl.classList.remove('done'); btnEl.textContent = 'Copy'; }, 1600); }
  }).catch(() => {});
}

/* ── Per-column actions ── */
function sortList(side) {
  const ta = document.getElementById('list-' + side);
  ta.value = parseList(ta.value).sort((a,b) => a.localeCompare(b, undefined, {sensitivity:'base'})).join('\n');
  colState[side].sorted = true;
  updateTags(side); updateStats(side);
  flashDone('sort-btn-' + side);
  toast('List ' + side.toUpperCase() + ' sorted A–Z');
}

function stripList(side) {
  const ta = document.getElementById('list-' + side);
  ta.value = parseList(ta.value).map(e => e.replace(/@mckinnonsc\.vic\.edu\.au$/i, '').trim()).join('\n');
  colState[side].stripped = true;
  updateTags(side); updateStats(side);
  flashDone('strip-btn-' + side);
  toast('Email domains stripped from list ' + side.toUpperCase());
}

function dedupList(side) {
  const ta = document.getElementById('list-' + side);
  const original = parseList(ta.value);
  const seen = new Set();
  const deduped = original.filter(e => {
    const key = e.toLowerCase().trim();
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });
  const removed = original.length - deduped.length;
  ta.value = deduped.join('\n');
  updateStats(side);
  flashDone('dedup-btn-' + side);
  toast('Removed ' + removed + ' duplicate' + (removed !== 1 ? 's' : '') + ' from list ' + side.toUpperCase());
}

function clearList(side) {
  document.getElementById('list-' + side).value = '';
  colState[side].sorted = false; colState[side].stripped = false;
  updateTags(side); updateStats(side);
}

async function pasteFromClipboard(side) {
  try {
    const text = await navigator.clipboard.readText();
    const ta = document.getElementById('list-' + side);
    ta.value = text.trim();
    colState[side].sorted = false; colState[side].stripped = false;
    updateTags(side); updateStats(side);
    flashDone('paste-btn-' + side);
    toast('Pasted into list ' + side.toUpperCase());
  } catch(e) {
    toast('Clipboard access denied — paste manually');
  }
}

/* ── Global ── */
function swapLists() {
  const ta = document.getElementById('list-a'), tb = document.getElementById('list-b');
  [ta.value, tb.value] = [tb.value, ta.value];
  const tmp = {...colState.a}; colState.a = {...colState.b}; colState.b = tmp;
  updateTags('a'); updateTags('b'); updateStats('a'); updateStats('b');
  toast('Lists swapped');
}

function mergeLists() {
  const ta = document.getElementById('list-a'), tb = document.getElementById('list-b');
  const combined = [...parseList(ta.value), ...parseList(tb.value)];
  const seen = new Set();
  ta.value = combined.filter(e => { const k = e.toLowerCase().trim(); if(seen.has(k)) return false; seen.add(k); return true; }).join('\n');
  colState.a.sorted = false; colState.a.stripped = false;
  updateTags('a'); updateStats('a');
  toast('Merged unique entries into list A');
}

/* ── Clear all with confirmation ── */
let clearConfirmTimer = null;
function clearAllWithConfirm() {
  const btn = document.getElementById('clear-all-btn');
  const lbl = document.getElementById('clear-label');
  if (btn.classList.contains('confirming')) {
    clearTimeout(clearConfirmTimer);
    btn.classList.remove('confirming');
    lbl.textContent = 'Clear all';
    clearList('a'); clearList('b');
    document.getElementById('results-area').innerHTML = `<div class="empty-state">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <p>Paste your lists above, then click <strong>Compare lists</strong></p>
    </div>`;
    updateWorkflowStep();
    toast('Cleared');
  } else {
    btn.classList.add('confirming');
    lbl.textContent = 'Confirm clear';
    clearConfirmTimer = setTimeout(() => {
      btn.classList.remove('confirming');
      lbl.textContent = 'Clear all';
    }, 3000);
  }
}

/* ── Compare ── */
function compare()           { runCompare(false); }
function compareIgnoreCase() { runCompare(true); }

function runCompare(ci) {
  const rawA = parseList(document.getElementById('list-a').value);
  const rawB = parseList(document.getElementById('list-b').value);
  if (!rawA.length && !rawB.length) { toast('Both lists are empty'); return; }

  const procA = rawA.map(e => processEntry(e, false, ci));
  const procB = rawB.map(e => processEntry(e, false, ci));

  const mapA = new Map(), mapB = new Map();
  procA.forEach((p,i) => { if(!mapA.has(p)) mapA.set(p, rawA[i]); });
  procB.forEach((p,i) => { if(!mapB.has(p)) mapB.set(p, rawB[i]); });

  const setA = new Set(mapA.keys()), setB = new Set(mapB.keys());
  let onlyInA = [...setA].filter(k => !setB.has(k));
  let onlyInB = [...setB].filter(k => !setA.has(k));
  let common  = [...setA].filter(k =>  setB.has(k));

  const dupeA = findDupes(procA, rawA);
  const dupeB = findDupes(procB, rawB);
  const totalA = mapA.size, totalB = mapB.size;
  const modeNote = ci ? '<span style="font-size:11px;color:var(--text-muted);font-weight:400;margin-left:4px">(case-insensitive)</span>' : '';

  flashDone('compare-btn');

  let html = `<div class="summary-bar">
    <div class="summary-card"><div class="sc-num">${totalA}</div><div class="sc-label">Unique in A</div></div>
    <div class="summary-card"><div class="sc-num">${totalB}</div><div class="sc-label">Unique in B</div></div>
    <div class="summary-card"><div class="sc-num" style="color:var(--green)">${common.length}</div><div class="sc-label">In both</div></div>
    <div class="summary-card"><div class="sc-num" style="color:var(--red)">${onlyInA.length + onlyInB.length}</div><div class="sc-label">Total missing</div></div>
  </div><div class="results-grid">`;

  if (onlyInA.length === 0 && onlyInB.length === 0) {
    html += `<div class="result-block t-green" style="grid-column:1/-1">
      <div class="result-head"><span class="rh-title">Lists are identical — no differences found${modeNote}</span><span class="pill pill-green">${common.length} entries match</span></div>
    </div>`;
  }

  if (onlyInA.length) html += resultBlock('amber', 'Missing from list B', onlyInA.map(k=>mapA.get(k)), 'pill-amber');
  if (onlyInB.length) html += resultBlock('blue',  'Missing from list A', onlyInB.map(k=>mapB.get(k)), 'pill-blue');
  if (common.length)  html += resultBlock('green', 'Present in both lists', common.map(k=>mapA.get(k)), 'pill-green');

  html += `</div>`;

  if (dupeA.length || dupeB.length) {
    html += `<div class="results-grid" style="margin-top:12px">`;
    if (dupeA.length) html += resultBlock('red',    'Duplicates in list A', dupeA, 'pill-red');
    if (dupeB.length) html += resultBlock('purple', 'Duplicates in list B', dupeB, 'pill-purple');
    html += `</div>`;
  }

  document.getElementById('results-area').innerHTML = html;
  document.getElementById('results-area').scrollIntoView({behavior:'smooth', block:'nearest'});
  updateWorkflowStep();
}

function findDupes(proc, raw) {
  const seen = new Map();
  proc.forEach((p,i) => { if(!seen.has(p)) seen.set(p,[]); seen.get(p).push(raw[i]); });
  const dupes = [];
  seen.forEach(arr => { if(arr.length > 1) dupes.push(...arr.slice(1)); });
  return dupes;
}

function resultBlock(accent, title, entries, pillClass) {
  const id = 'rb_' + Math.random().toString(36).slice(2);
  window['_rb_' + id] = entries;
  return `<div class="result-block t-${accent}">
    <div class="result-head">
      <span class="rh-title">${title}</span>
      <span class="pill ${pillClass}">${entries.length}</span>
      <button class="result-copy-btn" id="copy-${id}" onclick="copyText(window['_rb_${id}'], document.getElementById('copy-${id}'))">Copy</button>
    </div>
    <div class="result-body">
      ${entries.length === 0
        ? '<div class="result-empty">None</div>'
        : entries.map((e,i) => `<div class="entry"><span class="e-index">${i+1}</span><span class="e-val">${esc(e)}</span></div>`).join('')}
    </div>
  </div>`;
}

function exportCSV() {
  const rawA = parseList(document.getElementById('list-a').value);
  const rawB = parseList(document.getElementById('list-b').value);
  if (!rawA.length && !rawB.length) { toast('Nothing to export'); return; }

  const procA = rawA.map(e => processEntry(e, false, true));
  const procB = rawB.map(e => processEntry(e, false, true));
  const setA = new Set(procA), setB = new Set(procB);
  const all = new Set([...procA, ...procB]);

  let csv = 'entry,in_list_a,in_list_b,status\n';
  all.forEach(k => {
    const inA = setA.has(k), inB = setB.has(k);
    const status = inA && inB ? 'both' : inA ? 'only_in_a' : 'only_in_b';
    csv += `"${k.replace(/"/g,'""')}",${inA},${inB},${status}\n`;
  });

  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'staff-comparison-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  toast('CSV exported');
}

updateStats('a');
updateStats('b');
</script>
</body>
</html>
